name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Run tests with coverage
        run: pnpm test:run --coverage

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  bindings:
    name: Type Bindings Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf cmake

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check type bindings are up to date
        run: |
          pnpm generate:types
          git diff --exit-code src/types/bindings/ || (echo "Type bindings are out of date. Run 'pnpm generate:types' and commit." && exit 1)

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Frontend audit
        run: pnpm audit --audit-level=critical --prod
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Backend audit
        run: cd src-tauri && cargo audit

  e2e:
    name: E2E & Visual Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good libunwind-dev \
            webkit2gtk-driver dbus-x11 xvfb

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install tauri-driver
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        id: cache-tauri-driver
        with:
          path: ~/.cargo/bin/tauri-driver
          key: tauri-driver-${{ runner.os }}-v1
      - if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri binary (debug, HTTP frontend)
        run: |
          # Use HTTP URL for frontendDist so WebKitGTK loads via HTTP
          # instead of tauri:// custom protocol (ES modules fail on custom protocols)
          pnpm tauri build --debug --no-bundle \
            --config '{"build":{"frontendDist":"http://127.0.0.1:1420","beforeBuildCommand":""}}'

      - name: Start SSH test servers
        run: |
          cd docker && ./setup-test-env.sh

      - name: Start Xvfb and D-Bus
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # Disable DMA-BUF renderer: fails on headless CI without GPU
          echo "WEBKIT_DISABLE_DMABUF_RENDERER=1" >> $GITHUB_ENV
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV

      - name: Start frontend server
        run: |
          pnpm exec vite preview --port 1420 --strictPort --host 0.0.0.0 &
          for i in $(seq 1 10); do
            if curl -s http://127.0.0.1:1420 > /dev/null 2>&1; then
              echo "Frontend server is ready"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "Error: Frontend server failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Start tauri-driver
        run: |
          ~/.cargo/bin/tauri-driver &
          for i in $(seq 1 10); do
            if curl -s http://127.0.0.1:4444/status > /dev/null 2>&1; then
              echo "tauri-driver is ready"
              break
            fi
            if [ $i -eq 10 ]; then
              echo "Error: tauri-driver failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Run backend integration tests
        run: cd src-tauri && cargo test --test integration_tests --test service_integration -- --test-threads=1

      - name: Run E2E tests
        env:
          TAURI_DRIVER_EXTERNAL: "1"
        run: pnpm test:e2e

      - name: Run visual regression tests
        env:
          TAURI_DRIVER_EXTERNAL: "1"
        run: pnpm test:visual

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: e2e-test-results
          path: test/e2e/.tmp/
          retention-days: 7

      - name: Stop SSH test servers
        if: always()
        run: cd docker && docker compose down
